<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ChatGPT Conversation Copier — Settings</title>
<style>
  :root {
    --accent: #10a37f;
    --bg: #f7f7f8;
    --card: #ffffff;
    --border: #e3e3e6;
    --text: #202123;
    --muted: #6e6e80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 40px 24px;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
  }
  p.sub {
    color: var(--muted);
    margin: 0 0 28px;
    font-size: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 15px;
    margin: 0 0 4px;
  }
  .card p.desc {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 16px;
  }
  .field {
    margin-bottom: 14px;
  }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  textarea {
    width: 100%;
    min-height: 52px;
    resize: vertical;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fafafa;
    color: var(--text);
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
  }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { opacity: 0.92; }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  #status {
    font-size: 13px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  #status.show { opacity: 1; }
  .preview {
    background: #fafafa;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12.5px;
    white-space: pre-wrap;
    color: var(--text);
    margin-top: 18px;
  }
  .preview .label {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>ChatGPT Conversation Copier</h1>
    <p class="sub">Choose what text gets added before and after each message when you copy a conversation.</p>

    <div class="card">
      <h2>User prompts</h2>
      <p class="desc">Wraps every message you sent.</p>
      <div class="field">
        <label for="beforeUser">Before each user prompt</label>
        <textarea id="beforeUser" placeholder="e.g. +++&#10;"></textarea>
      </div>
      <div class="field">
        <label for="afterUser">After each user prompt</label>
        <textarea id="afterUser" placeholder="(optional)"></textarea>
      </div>
    </div>

    <div class="card">
      <h2>Assistant replies</h2>
      <p class="desc">Wraps every ChatGPT response.</p>
      <div class="field">
        <label for="beforeAssistant">Before each assistant reply</label>
        <textarea id="beforeAssistant" placeholder="(optional)"></textarea>
      </div>
      <div class="field">
        <label for="afterAssistant">After each assistant reply</label>
        <textarea id="afterAssistant" placeholder="(optional)"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="actions">
        <button id="save">Save settings</button>
        <button id="reset" class="secondary">Reset to defaults</button>
        <span id="status">Saved ✓</span>
      </div>
      <div class="preview" id="preview">
        <span class="label">Preview</span>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
